; SHOUTcast DNAS v2 minimal configuration
; Replace the placeholder passwords before running in production.

; Required: source password used by broadcaster/source client
password=[[DJPASSWORD]]

; Required: admin password (must be different from 'password')
adminpassword=[[ADMINPASSWORD]]

; Listener/source/admin port (default is 8000, set explicitly here)
portbase=[[STREAMPORT]]

; Base listener limit (default is 512, set explicitly for clarity)
maxuser=[[LISTENERS]]

; Global source bitrate limits in bits per second
minbitrate=[[BITRATELOW]]
maxbitrate=[[BITRATEHIGH]]

; Optional but practical defaults for this workspace
logfile=logs/sc_serv.log
w3clog=logs/sc_w3c.log
