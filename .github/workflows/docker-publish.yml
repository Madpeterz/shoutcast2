name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # Example: docker.io
  REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  # Example: your-dockerhub-user/shoutcast2
  IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${REGISTRY}" || (echo "Missing secret: DOCKER_REGISTRY" && exit 1)
          test -n "${IMAGE_NAME}" || (echo "Missing secret: DOCKER_IMAGE_NAME" && exit 1)
          test -n "${{ secrets.DOCKER_USERNAME }}" || (echo "Missing secret: DOCKER_USERNAME" && exit 1)
          test -n "${{ secrets.DOCKER_TOKEN }}" || (echo "Missing secret: DOCKER_TOKEN" && exit 1)

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
